name: app-release

# Reusable release pipeline for MajNet app repos (ADR 0009). Called on a tag
# `vX.Y.Z`: build + push the app image (and an optional migration image) to
# GHCR by digest, write the `majnet-release.yaml` descriptor, and publish a
# GitHub Release with it attached. The bot reads that asset off the `release`
# webhook and records the release; an operator then promotes it to production.
#
#   # .github/workflows/release.yaml in the app repo:
#   on: { push: { tags: ['v*'] } }
#   jobs:
#     release:
#       uses: maxa-ondrej/majnet/.github/workflows/app-release.yaml@main
#       permissions: { contents: write, packages: write }
#       with:
#         migration_command: '["dbmate", "up"]'   # optional

on:
  workflow_call:
    inputs:
      image:
        description: Image name; defaults to ghcr.io/<owner>/<repo>.
        type: string
        default: ''
      dockerfile:
        type: string
        default: Dockerfile
      context:
        type: string
        default: .
      migration_command:
        description: Migration argv as a JSON array; omit for no migration.
        type: string
        default: ''
      migration_dockerfile:
        description: Separate migration image; omit to run the command in the app image.
        type: string
        default: ''

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: resolve image name (lowercase)
        id: img
        run: |
          IMG="${{ inputs.image }}"
          [ -n "$IMG" ] || IMG="ghcr.io/${{ github.repository }}"
          echo "image=${IMG,,}" >> "$GITHUB_OUTPUT"

      - name: build + push app image
        id: app
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.img.outputs.image }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: build + push migration image
        id: mig
        if: inputs.migration_dockerfile != ''
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.migration_dockerfile }}
          push: true
          tags: ${{ steps.img.outputs.image }}-migrate:${{ github.ref_name }}

      - name: write majnet-release.yaml
        run: |
          {
            echo "version: ${{ github.ref_name }}"
            echo "commit: ${{ github.sha }}"
            echo "app: ${{ steps.img.outputs.image }}@${{ steps.app.outputs.digest }}"
            if [ -n '${{ inputs.migration_command }}' ]; then
              echo "migration:"
              if [ -n "${{ steps.mig.outputs.digest }}" ]; then
                echo "  image: ${{ steps.img.outputs.image }}-migrate@${{ steps.mig.outputs.digest }}"
              fi
              echo "  command: ${{ inputs.migration_command }}"
            fi
          } > majnet-release.yaml
          echo "── majnet-release.yaml ──"; cat majnet-release.yaml

      - name: publish release with descriptor
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: majnet-release.yaml
          fail_on_unmatched_files: true
