name: app-release

# Reusable release pipeline for MajNet app repos (ADR 0009). Called on a tag
# `vX.Y.Z`: build + push the app image to GHCR tagged with the version. A
# `vX.Y.Z`-tagged image publish IS the release — the `registry_package` webhook
# carries the tag + digest, and the bot records the release and auto-tracks it
# into `stable`. There is no release descriptor: the migration lives in the ops
# overlay (`base.yaml`), and an operator promotes a chosen version to
# production from the dashboard.
#
#   # .github/workflows/release.yaml in the app repo:
#   on: { push: { tags: ['v*'] } }
#   jobs:
#     release:
#       uses: maxa-ondrej/majnet/.github/workflows/app-release.yaml@main
#       permissions: { contents: read, packages: write }

on:
  workflow_call:
    inputs:
      image:
        description: Image name; defaults to ghcr.io/<owner>/<repo>.
        type: string
        default: ''
      dockerfile:
        type: string
        default: Dockerfile
      context:
        type: string
        default: .

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: resolve image name (lowercase)
        id: img
        run: |
          IMG="${{ inputs.image }}"
          [ -n "$IMG" ] || IMG="ghcr.io/${{ github.repository }}"
          echo "image=${IMG,,}" >> "$GITHUB_OUTPUT"

      - name: build + push app image (tagged with the version)
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.img.outputs.image }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
