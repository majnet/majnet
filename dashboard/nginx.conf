# Proxies to the WG-internal APIs (bot :8081, reconciler :9090 on the main
# node's WireGuard IP). Adjust 10.88.0.1 if nodes.yaml changes.
#
# Identity/trust: this MUST only be reachable through `tailscale serve`,
# which sets Tailscale-User-Login itself (client-supplied values never pass
# through it). The backends role-check that header (common/src/authz.rs);
# exposing this vhost any other way would let callers spoof identity.
server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    location /api/bot/ {
        proxy_pass http://10.88.0.1:8081/;
        proxy_set_header Tailscale-User-Login $http_tailscale_user_login;
    }

    location /api/recon/ {
        proxy_pass http://10.88.0.1:9090/;
        proxy_set_header Tailscale-User-Login $http_tailscale_user_login;
    }
}
