# MajNet release pipeline (ADR 0009): tag `vX.Y.Z` → build + push the image
# tagged with the version. That publish is the release — the bot records it and
# an operator promotes a chosen version to production. Continuous main/PR builds
# still go through build.yaml (the testing/ephemeral build tier). The migration
# (if any) is configured in the ops overlay's `migration:` field, not here.
name: release

on:
  push:
    tags: ['v*']

jobs:
  release:
    permissions:
      contents: read
      packages: write
    uses: maxa-ondrej/majnet/.github/workflows/app-release.yaml@main
